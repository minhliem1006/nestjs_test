services:
  postgres:
    image: postgres:16-alpine
    container_name: refresh_token_pg
    environment:
      POSTGRES_DB: refresh_token_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_password
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data  # giữ data khi restart container

  redis:
    image: redis:7-alpine
    container_name: refresh_token_redis
    ports:
      - "6379:6379"

volumes:
  pg_data:
